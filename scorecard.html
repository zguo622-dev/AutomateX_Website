<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free AI Readiness Self-Assessment | AutomateX</title>
<meta name="description" content="Take the free AI Readiness Self-Assessment. 20 questions, 5 minutes, instant results.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Open+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #F96532;
    --orange-light: #FB7B3A;
    --orange-dark: #ED4A3B;
    --navy: #1A1F36;
    --navy-deep: #0D1117;
    --white: #ffffff;
    --gray-50: #f9fafb;
    --gray-100: #f3f4f6;
    --gray-200: #e5e7eb;
    --gray-300: #d1d5db;
    --gray-400: #9ca3af;
    --gray-500: #6b7280;
    --gray-600: #4b5563;
    --gray-700: #374151;
    --green: #10B981;
    --yellow: #F59E0B;
    --red: #EF4444;
    --font-heading: 'Montserrat', sans-serif;
    --font-body: 'Open Sans', sans-serif;
    --transition-fast: 150ms ease;
    --transition-med: 300ms cubic-bezier(0.4, 0, 0.2, 1);
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    -webkit-font-smoothing: antialiased;
    scroll-behavior: smooth;
    font-size: 16px;
  }

  body {
    font-family: var(--font-body);
    color: var(--navy);
    background: var(--gray-50);
    line-height: 1.6;
    min-height: 100vh;
  }

  ::selection { background: var(--orange); color: var(--white); }

  /* ========== HEADER ========== */
  .sc-header {
    background: var(--white);
    border-bottom: 1px solid var(--gray-200);
    padding: 0.875rem 0;
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .sc-header-inner {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .sc-logo {
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    color: var(--navy);
  }

  .sc-logo img { width: 24px; height: 24px; }

  .sc-logo span {
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: 0.9375rem;
  }

  .sc-progress-wrap {
    flex: 1;
    max-width: 300px;
    margin-left: 2rem;
  }

  .sc-progress-bar {
    height: 4px;
    background: var(--gray-200);
    border-radius: 2px;
    overflow: hidden;
  }

  .sc-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--orange-light), var(--orange-dark));
    border-radius: 2px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    width: 0%;
  }

  .sc-progress-text {
    font-family: var(--font-heading);
    font-size: 0.6875rem;
    font-weight: 600;
    color: var(--gray-400);
    margin-top: 0.25rem;
    text-align: right;
  }

  /* ========== MAIN CONTAINER ========== */
  .sc-main {
    max-width: 640px;
    margin: 0 auto;
    padding: 3rem 1.5rem 4rem;
    min-height: calc(100vh - 60px);
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  /* ========== QUESTION SCREEN ========== */
  .sc-screen {
    display: none;
    animation: fadeIn 0.3s ease;
  }

  .sc-screen.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .sc-pillar-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.375rem;
    font-family: var(--font-heading);
    font-size: 0.6875rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--orange);
    background: rgba(249,101,50,0.06);
    border: 1px solid rgba(249,101,50,0.12);
    padding: 0.25rem 0.75rem;
    border-radius: 100px;
    margin-bottom: 1.25rem;
  }

  .sc-question-num {
    font-family: var(--font-heading);
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--gray-400);
    margin-bottom: 0.5rem;
  }

  .sc-question-text {
    font-family: var(--font-heading);
    font-size: clamp(1.125rem, 2.5vw, 1.375rem);
    font-weight: 700;
    color: var(--navy);
    line-height: 1.35;
    letter-spacing: -0.01em;
    margin-bottom: 2rem;
  }

  /* ========== ANSWER OPTIONS ========== */
  .sc-options {
    display: flex;
    flex-direction: column;
    gap: 0.625rem;
  }

  .sc-option {
    display: block;
    width: 100%;
    text-align: left;
    padding: 1rem 1.25rem;
    background: var(--white);
    border: 1.5px solid var(--gray-200);
    border-radius: 10px;
    font-family: var(--font-body);
    font-size: 0.9375rem;
    color: var(--navy);
    cursor: pointer;
    transition: border-color var(--transition-fast), background var(--transition-fast), box-shadow var(--transition-fast), transform var(--transition-fast);
    line-height: 1.5;
  }

  .sc-option:hover {
    border-color: var(--orange);
    background: rgba(249,101,50,0.02);
    transform: translateY(-1px);
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }

  .sc-option.selected {
    border-color: var(--orange);
    background: rgba(249,101,50,0.04);
    box-shadow: 0 0 0 3px rgba(249,101,50,0.08);
  }

  /* ── 1-10 Scale UI ── */
  .sc-scale-anchors {
    display: flex;
    justify-content: space-between;
    font-size: 0.8125rem;
    color: var(--gray-500);
    margin-bottom: 0.875rem;
    line-height: 1.4;
    gap: 1rem;
  }

  .sc-scale-anchors span:last-child { text-align: right; }

  .sc-scale-btns {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 0.5rem;
  }

  .sc-scale-btn {
    width: 52px;
    height: 52px;
    border-radius: 10px;
    border: 1.5px solid var(--gray-200);
    background: var(--white);
    font-family: var(--font-heading);
    font-size: 1.0625rem;
    font-weight: 700;
    color: var(--navy);
    cursor: pointer;
    transition: border-color var(--transition-fast), background var(--transition-fast), transform var(--transition-fast), box-shadow var(--transition-fast);
  }

  .sc-scale-btn:hover {
    border-color: var(--orange);
    transform: translateY(-2px);
    box-shadow: 0 3px 10px rgba(249,101,50,0.12);
  }

  .sc-scale-btn.selected {
    background: var(--orange);
    border-color: var(--orange);
    color: var(--white);
    box-shadow: 0 4px 14px rgba(249,101,50,0.3);
    transform: translateY(-2px);
  }

  /* Segmentation header */
  .sc-segment-header {
    font-family: var(--font-heading);
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 0.5rem;
  }

  /* Multi-select for Q18 */
  .sc-option-multi {
    position: relative;
    padding-left: 2.75rem;
  }

  .sc-option-multi::before {
    content: '';
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--gray-300);
    border-radius: 4px;
    transition: var(--transition-fast);
  }

  .sc-option-multi.selected::before {
    background: var(--orange);
    border-color: var(--orange);
  }

  .sc-option-multi.selected::after {
    content: '';
    position: absolute;
    left: 1.25rem;
    top: 50%;
    transform: translateY(-60%) rotate(45deg);
    width: 5px;
    height: 9px;
    border: 2px solid var(--white);
    border-top: none;
    border-left: none;
  }

  /* Open text */
  .sc-textarea {
    width: 100%;
    min-height: 120px;
    padding: 1rem;
    border: 1.5px solid var(--gray-200);
    border-radius: 10px;
    font-family: var(--font-body);
    font-size: 0.9375rem;
    color: var(--navy);
    background: var(--white);
    resize: vertical;
    outline: none;
    transition: border-color var(--transition-fast);
  }

  .sc-textarea:focus { border-color: var(--orange); }
  .sc-textarea::placeholder { color: var(--gray-400); }

  /* ========== NAVIGATION BUTTONS ========== */
  .sc-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 2rem;
    gap: 1rem;
  }

  .sc-btn {
    font-family: var(--font-heading);
    font-weight: 600;
    font-size: 0.875rem;
    padding: 0.75rem 1.5rem;
    border-radius: 8px;
    cursor: pointer;
    transition: transform var(--transition-fast), box-shadow var(--transition-fast), background var(--transition-fast);
    border: none;
  }

  .sc-btn:hover { transform: translateY(-1px); }

  .sc-btn-back {
    background: transparent;
    color: var(--gray-500);
  }

  .sc-btn-back:hover { color: var(--navy); }

  .sc-btn-next {
    background: linear-gradient(135deg, var(--orange-light), var(--orange-dark));
    color: var(--white);
    box-shadow: 0 2px 8px rgba(249,101,50,0.25);
    margin-left: auto;
  }

  .sc-btn-next:hover { box-shadow: 0 4px 16px rgba(249,101,50,0.35); }

  .sc-btn-next:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  .sc-skip {
    font-size: 0.8125rem;
    color: var(--gray-400);
    cursor: pointer;
    background: none;
    border: none;
    font-family: var(--font-body);
    transition: color var(--transition-fast);
    margin-top: 1rem;
    text-align: center;
    display: block;
    width: 100%;
  }

  .sc-skip:hover { color: var(--gray-600); }

  /* ========== RESULTS ========== */
  .results-header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .results-score-circle {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: var(--white);
    border: 6px solid var(--gray-200);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.5rem;
    position: relative;
  }

  .results-score-circle.low { border-color: var(--red); }
  .results-score-circle.mid { border-color: var(--yellow); }
  .results-score-circle.high { border-color: var(--green); }

  .results-score-num {
    font-family: var(--font-heading);
    font-size: 2.5rem;
    font-weight: 800;
    line-height: 1;
    color: var(--navy);
  }

  .results-score-label {
    font-family: var(--font-heading);
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--gray-400);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 0.25rem;
  }

  .results-headline {
    font-family: var(--font-heading);
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 0.5rem;
  }

  .results-subtitle {
    font-size: 0.9375rem;
    color: var(--gray-500);
    line-height: 1.6;
    max-width: 480px;
    margin: 0 auto;
  }

  /* Pillar breakdown */
  .pillar-breakdown {
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: 12px;
    padding: 2rem;
    margin-bottom: 1.5rem;
  }

  .pillar-breakdown h3 {
    font-family: var(--font-heading);
    font-size: 0.9375rem;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 1.25rem;
  }

  .pillar-row {
    display: grid;
    grid-template-columns: 100px 1fr 44px;
    align-items: center;
    gap: 1rem;
    margin-bottom: 0.875rem;
  }

  .pillar-row:last-child { margin-bottom: 0; }

  .pillar-name {
    font-family: var(--font-heading);
    font-size: 0.8125rem;
    font-weight: 600;
    color: var(--navy);
  }

  .pillar-bar {
    height: 10px;
    background: var(--gray-100);
    border-radius: 5px;
    overflow: hidden;
  }

  .pillar-bar-fill {
    height: 100%;
    border-radius: 5px;
    transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .pillar-bar-fill.low { background: var(--red); }
  .pillar-bar-fill.mid { background: var(--yellow); }
  .pillar-bar-fill.high { background: var(--green); }

  .pillar-pct {
    font-family: var(--font-heading);
    font-size: 0.8125rem;
    font-weight: 700;
    color: var(--gray-600);
    text-align: right;
  }

  .weakest-callout {
    background: rgba(239,68,68,0.04);
    border: 1px solid rgba(239,68,68,0.12);
    border-radius: 10px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.5rem;
    display: flex;
    gap: 0.75rem;
    align-items: flex-start;
  }

  .weakest-callout-icon {
    width: 20px;
    height: 20px;
    color: var(--red);
    flex-shrink: 0;
    margin-top: 2px;
  }

  .weakest-callout h4 {
    font-family: var(--font-heading);
    font-size: 0.875rem;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 0.25rem;
  }

  .weakest-callout p {
    font-size: 0.8125rem;
    line-height: 1.6;
    color: var(--gray-500);
  }

  /* Email gate */
  .email-gate {
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: 12px;
    padding: 2rem;
    text-align: center;
    margin-bottom: 1.5rem;
  }

  .email-gate h3 {
    font-family: var(--font-heading);
    font-size: 1rem;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 0.375rem;
  }

  .email-gate p {
    font-size: 0.875rem;
    color: var(--gray-500);
    margin-bottom: 1.25rem;
  }

  .email-gate-form {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    max-width: 480px;
    margin: 0 auto;
    text-align: left;
  }

  .email-gate-form .full-width {
    grid-column: 1 / -1;
  }

  .email-gate-form label {
    font-family: var(--font-heading);
    font-size: 0.6875rem;
    font-weight: 600;
    color: var(--gray-500);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.25rem;
    display: block;
  }

  .email-gate-form label .optional {
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
    color: var(--gray-400);
  }

  .email-gate-form input {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 1.5px solid var(--gray-200);
    border-radius: 8px;
    font-family: var(--font-body);
    font-size: 0.875rem;
    color: var(--navy);
    outline: none;
    background: var(--gray-50);
  }

  .email-gate-form input:focus { border-color: var(--orange); }
  .email-gate-form input::placeholder { color: var(--gray-400); }

  .email-gate-form button {
    grid-column: 1 / -1;
    padding: 0.875rem 1.25rem;
    border-radius: 8px;
    background: var(--orange);
    color: var(--white);
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: 0.9375rem;
    border: none;
    cursor: pointer;
    white-space: nowrap;
    transition: background var(--transition-fast), transform var(--transition-fast);
    margin-top: 0.25rem;
  }

  .email-gate-form button:hover { background: var(--orange-dark); transform: translateY(-1px); }
  .email-gate-form button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  /* Magnetize particle (reused from waitlist) */
  .sc-submit-wrap {
    position: relative;
    display: block;
    grid-column: 1 / -1;
    width: 100%;
  }
  .sc-submit-wrap button {
    width: 100%;
  }
  .sc-magnetize-particle {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--orange);
    pointer-events: none;
    top: 50%; left: 50%;
    margin: -3px 0 0 -3px;
    transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.4s ease;
    opacity: 0.8;
  }
  .sc-magnetize-particle.attracted { transform: translate(0,0) !important; opacity: 1; }
  .sc-magnetize-particle.burst { opacity: 0; transition: transform 0.5s ease-out, opacity 0.5s ease-out; }

  /* Earned CTA */
  .earned-cta {
    display: none;
    text-align: center;
    margin-top: 1.5rem;
    padding: 1.5rem;
    background: linear-gradient(135deg, rgba(249,101,50,0.06), rgba(249,101,50,0.02));
    border: 1px solid rgba(249,101,50,0.2);
    border-radius: 16px;
    animation: earnedFadeIn 0.6s ease forwards;
  }
  @keyframes earnedFadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .earned-cta-eyebrow {
    font-family: var(--font-heading);
    font-size: 0.6875rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 0.5rem;
  }
  .earned-cta h4 {
    font-family: var(--font-heading);
    font-size: 1.0625rem;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 0.375rem;
  }
  .earned-cta p {
    font-size: 0.875rem;
    color: var(--gray-500);
    margin-bottom: 1.25rem;
  }

  /* CTA */
  .results-cta {
    text-align: center;
    margin-top: 1.5rem;
  }

  .results-cta p {
    font-size: 0.875rem;
    color: var(--gray-500);
    margin-bottom: 1rem;
  }

  .results-cta .sc-btn-next {
    margin: 0;
    padding: 0.875rem 2rem;
    font-size: 1rem;
  }

  /* ========== RESPONSIVE ========== */
  @media (max-width: 640px) {
    .sc-progress-wrap { max-width: 180px; margin-left: 1rem; }
    .email-gate-form { grid-template-columns: 1fr; }
    .pillar-row { grid-template-columns: 80px 1fr 36px; gap: 0.625rem; }
  }
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="sc-header">
  <div class="sc-header-inner">
    <a href="index.html" class="sc-logo">
      <img src="brand_assets/Logo.png" alt="AutomateX">
      <span>AutomateX</span>
    </a>
    <div class="sc-progress-wrap">
      <div class="sc-progress-bar">
        <div class="sc-progress-fill" id="progress-fill"></div>
      </div>
      <div class="sc-progress-text" id="progress-text">0 / 20</div>
    </div>
  </div>
</header>

<!-- ===== MAIN ===== -->
<main class="sc-main" id="sc-main">
  <!-- Screens injected by JS -->
</main>

<script>
(function() {
  // ========== QUESTION DATA ==========
  // scale: true  = 1-10 slider question; scaleMin/scaleMax = anchor labels
  // Scoring for scale: 1-3 → 0pts, 4-6 → 1pt, 7-10 → 3pts
  // Scoring for MCQ:   best=3, mid=1, worst=0
  // Scored pillars: Pilot, Automate, Compound, Evolve, Digitalise (Q1-Q15)
  // Unscored: Segmentation (Q16-Q19), openText (Q20)
  const questions = [
    // ── OPENING: most relatable questions first ──
    // Q1 — AUTOMATE (universal pain: hunting for info)
    { id: 1, pillar: 'Automate', scale: true,
      text: 'How easily can your engineers find the right standard or past precedent before starting a submission?',
      scaleMin: 'Significant time lost hunting across emails and shared drives',
      scaleMax: 'Instant \u2014 everything is organised and accessible',
      scores: [] },

    // Q2 — PILOT (templates / starting fresh)
    { id: 2, pillar: 'Pilot', scale: true,
      text: 'How consistently does your team start new schemes from structured templates informed by past projects?',
      scaleMin: 'We largely start from scratch each time',
      scaleMax: 'Always \u2014 templates are embedded and used by everyone',
      scores: [] },

    // Q3 — EVOLVE (pipeline vs delivery tension)
    { id: 3, pillar: 'Evolve', scale: true,
      text: 'When your team is heads-down on live delivery, how well does your pipeline of new work hold up?',
      scaleMin: 'Pipeline dries up completely when we\u2019re busy delivering',
      scaleMax: 'Both run smoothly and in parallel',
      scores: [] },

    // ── PILOT ──
    // Q4 — behaviour after a comment (type matters, not degree)
    { id: 4, pillar: 'Pilot',
      text: 'When you receive a significant review comment on a submission (e.g. CAT 3), what typically happens next?',
      options: [
        'We update our process so the same issue cannot recur',
        'We sometimes adjust, but it is not consistent',
        'We fix that specific comment and move on'
      ], scores: [3, 1, 0] },

    // Q5 — measurable improvement (yes/partly/no)
    { id: 5, pillar: 'Pilot',
      text: 'In the last 6 months, have you made a measurable improvement to your submission and assurance process (e.g. Form G production, DRN comments resolution)?',
      options: [
        'Yes, with clear evidence of fewer comments or faster approval',
        'We have made changes but have not measured the impact',
        'No specific changes have been made'
      ], scores: [3, 1, 0] },

    // ── AUTOMATE ──
    // Q6 — compliance map (does team know the specific standards/clauses required)
    { id: 6, pillar: 'Automate',
      text: 'Does your team have a clear and documented method to identify the specific standards, clauses, and compliance gates required for each project scope (e.g. Form A/B/G requirements)?',
      options: [
        'Yes, it is clearly documented and accessible, and junior engineers can work to it without guidance',
        'We have something, but it is incomplete or inconsistently applied across projects',
        'No, it relies on experienced engineers knowing what applies'
      ], scores: [3, 1, 0] },

    // Q7 — documented knowledge (degree)
    { id: 7, pillar: 'Automate', scale: true,
      text: 'How well is your engineering knowledge documented so a new or junior engineer can work on a simple submission (e.g. Form G/H) independently?',
      scaleMin: 'Almost everything lives in experienced engineers\u2019 heads',
      scaleMax: 'Fully documented and accessible to anyone on the team',
      scores: [] },

    // ── COMPOUND ──
    // Q8 — tracking revision cycles (do you or don't you)
    { id: 8, pillar: 'Compound',
      text: 'Do you track how many revision cycles your submissions go through, and is that number improving?',
      options: [
        'Yes, we track it and it is lower than 12 months ago',
        'We track loosely but have not seen clear improvement',
        'We do not track revision cycles'
      ], scores: [3, 1, 0] },

    // Q9 — past project knowledge accessibility (degree)
    { id: 9, pillar: 'Compound', scale: true,
      text: 'How easily can a new engineer or engineering manager (e.g. CEM/CRE) find and apply knowledge from a similar past project without asking a colleague?',
      scaleMin: 'They\u2019d have to ask around for days',
      scaleMax: 'Everything is findable independently within hours',
      scores: [] },

    // Q10 — opinion-driven review comments (frequency)
    { id: 10, pillar: 'Compound', scale: true,
      text: 'How often do you receive review comments from an assurer (e.g. DPE/PE) that feel preference-based rather than grounded in a specific standard?',
      scaleMin: 'Frequently \u2014 a major source of delays and frustration',
      scaleMax: 'Rarely \u2014 our submissions are well-anchored in cited standards',
      scores: [] },

    // ── EVOLVE ──
    // Q11 — why clients return (type of reason matters)
    { id: 11, pillar: 'Evolve',
      text: 'When a client gives you repeat work, why do they come back?',
      options: [
        'They actively sought us out, we are their first call',
        'A mix, reputation and price both played a role',
        'We competed on price again'
      ], scores: [3, 1, 0] },

    // Q12 — pipeline resilience (degree)
    { id: 12, pillar: 'Evolve', scale: true,
      text: 'If your two biggest client contacts moved on tomorrow, how resilient would your pipeline be?',
      scaleMin: 'At serious risk \u2014 most work flows through a few key relationships',
      scaleMax: 'Strong \u2014 we have systems that generate work independently',
      scores: [] },

    // ── DIGITALISE ──
    // Q13 — audit trail (can you or can't you)
    { id: 13, pillar: 'Digitalise',
      text: 'Can you produce a complete audit trail from design requirement to signed submission (e.g. Form G/H) in under 30 minutes?',
      options: [
        'Yes, consistently',
        'Sometimes, depending on the project',
        'No, it takes much longer and involves significant hunting'
      ], scores: [3, 1, 0] },

    // Q14 — AI reaction (type of attitude matters)
    { id: 14, pillar: 'Digitalise',
      text: 'When AI tools come up in team conversation, what is the typical reaction?',
      options: [
        'Active interest or healthy scepticism, open to evidence',
        'Uncertainty, we are not sure where to start',
        'Resistance, there is pushback on the idea'
      ], scores: [3, 1, 0] },

    // Q15 — knowledge walking out (degree, inverted)
    { id: 15, pillar: 'Digitalise', scale: true,
      text: 'If a senior engineer left tomorrow, how much of your core engineering capability and project knowledge would leave with them?',
      scaleMin: 'Critical capability would walk out the door',
      scaleMax: 'Very little, it is all in our systems and documented processes',
      scores: [] },

    // ── SEGMENTATION (unscored, personalises results) ──
    { id: 16, pillar: 'Segmentation', segment: true,
      text: 'How big is your delivery team?',
      options: [
        '1 to 5 people, engineer or engineering manager (e.g. CEM/CRE) coverage is thin',
        '6 to 12 people, multiple schemes reliant on key senior engineers',
        '13 to 30 people, multiple engineering managers running parallel streams',
        '31 or more people, delivering assurance at scale'
      ], scores: [0, 0, 0, 0] },

    { id: 17, pillar: 'Segmentation', segment: true, other: true,
      text: 'What is your primary role?',
      options: [
        'Technical Director, I set strategy and oversee delivery',
        'Engineering Manager (e.g. CEM/CRE), I lead delivery and sign off submissions',
        'Engineer, I produce or support the engineering deliverables',
        'Business Development or Bid Manager, I look after the pipeline and sales side',
        'Other'
      ], scores: [0, 0, 0, 0, 0] },

    { id: 18, pillar: 'Segmentation', multi: true, maxSelect: 2,
      text: 'Pick your top 2 priorities for the next 90 days:',
      options: [
        'Reduce submission comments and resubmissions (e.g. DRN)',
        'Stop relying on 1 or 2 key engineers for quality',
        'Reduce time lost to admin, version control and document management',
        'Make standards and past precedents easy to find',
        'Improve traceability and audit trail speed',
        'Stop the feast-or-famine pipeline cycle'
      ], scores: [0, 0, 0, 0, 0, 0] },

    { id: 19, pillar: 'Segmentation', segment: true,
      text: 'What type of support are you most open to?',
      options: [
        'Pilot a risk-free, low-commitment automation project with an AI expert to solve an existing repeating friction point',
        'A signed-off engineering resource (e.g. CEM/CRE) delivering on a mission-critical live scheme with AI-enabled solutions',
        'An off-the-shelf toolkit on a SaaS platform that engineers can plug into their existing workflow',
        'Training to help our team understand the best way to adopt AI in our business (e.g. webinar, CPD, Lunch and Learn)'
      ], scores: [0, 0, 0, 0] },

    // Q20 — open text (skippable)
    { id: 20, pillar: 'Segmentation', openText: true,
      text: 'Anything else you\u2019d like us to know before we show your results? (Optional)' }
  ];

  const pillarNames = ['Pilot', 'Automate', 'Compound', 'Evolve', 'Digitalise'];
  const totalQ = questions.length;
  let currentQ = 0;
  let answers = {};

  // Expose for submitReport to read dynamically
  window._scorecardQuestions = questions;
  window._scorecardAnswers = answers;

  const main = document.getElementById('sc-main');
  const progressFill = document.getElementById('progress-fill');
  const progressText = document.getElementById('progress-text');

  function updateProgress() {
    const pct = Math.round(((currentQ) / totalQ) * 100);
    progressFill.style.width = pct + '%';
    progressText.textContent = currentQ + ' / ' + totalQ;
  }

  function renderQuestion(idx) {
    const q = questions[idx];
    currentQ = idx;
    updateProgress();

    let html = '<div class="sc-screen active">';
    if (q.pillar !== 'Segmentation') {
      html += '<div class="sc-pillar-badge">' + q.pillar + '</div>';
    } else if (!q.openText) {
      html += '<div class="sc-segment-header">Almost there \u2014 help us personalise your results</div>';
    }
    html += '<div class="sc-question-num">Question ' + q.id + ' of ' + totalQ + '</div>';
    html += '<div class="sc-question-text">' + q.text + '</div>';

    if (q.openText) {
      html += '<textarea class="sc-textarea" id="open-text" placeholder="Optional \u2014 share anything that would help us understand your situation...">' + (answers[idx] || '') + '</textarea>';
    } else if (q.scale) {
      // 1-10 number picker
      const currentVal = answers[idx] !== undefined ? answers[idx] : null;
      html += '<div class="sc-scale-anchors"><span>' + q.scaleMin + '</span><span>' + q.scaleMax + '</span></div>';
      html += '<div class="sc-scale-btns">';
      for (let n = 1; n <= 10; n++) {
        html += '<button class="sc-scale-btn' + (currentVal === n ? ' selected' : '') + '" data-val="' + n + '">' + n + '</button>';
      }
      html += '</div>';
    } else if (q.multi) {
      html += '<div class="sc-options">';
      const selected = answers[idx] || [];
      q.options.forEach((opt, i) => {
        const isSelected = selected.includes(i);
        html += '<button class="sc-option sc-option-multi' + (isSelected ? ' selected' : '') + '" data-idx="' + i + '">' + opt + '</button>';
      });
      html += '</div>';
    } else {
      html += '<div class="sc-options">';
      q.options.forEach((opt, i) => {
        const isSelected = answers[idx] === i;
        html += '<button class="sc-option' + (isSelected ? ' selected' : '') + '" data-idx="' + i + '">' + opt + '</button>';
      });
      html += '</div>';
    }

    // Nav
    const isLastScored = idx === totalQ - 1;
    const isOpenText = q.openText;
    const needsNext = q.multi; // only multi-select needs explicit Next btn (scale + single MCQ auto-advance)
    html += '<div class="sc-nav">';
    if (idx > 0) {
      html += '<button class="sc-btn sc-btn-back" onclick="app.prev()">&#8592; Back</button>';
    } else {
      html += '<div></div>';
    }

    if (isOpenText) {
      html += '<button class="sc-btn sc-btn-next" onclick="app.next()">See My Results</button>';
    } else if (isLastScored || needsNext) {
      const disabled = answers[idx] === undefined ? ' disabled' : '';
      const label = isLastScored ? 'See My Results' : 'Next';
      html += '<button class="sc-btn sc-btn-next" onclick="app.next()" id="next-btn"' + disabled + '>' + label + '</button>';
    } else {
      html += '<div></div>';
    }
    html += '</div>';

    if (isOpenText) {
      html += '<button class="sc-skip" onclick="app.next()">Skip this question</button>';
    }

    html += '</div>';
    main.innerHTML = html;

    // Bind scale button clicks
    if (q.scale) {
      main.querySelectorAll('.sc-scale-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          const val = parseInt(this.dataset.val);
          answers[idx] = val;
          main.querySelectorAll('.sc-scale-btn').forEach(b => b.classList.remove('selected'));
          this.classList.add('selected');
          const nb = document.getElementById('next-btn');
          if (nb) nb.disabled = false;
          // Auto-advance after selection
          setTimeout(() => app.next(), 350);
        });
      });
    }

    // Bind MCQ option clicks
    if (!q.openText && !q.scale) {
      main.querySelectorAll('.sc-option').forEach(btn => {
        btn.addEventListener('click', function() {
          const optIdx = parseInt(this.dataset.idx);
          if (q.multi) {
            let sel = answers[idx] || [];
            if (sel.includes(optIdx)) {
              sel = sel.filter(s => s !== optIdx);
            } else if (sel.length < (q.maxSelect || 2)) {
              sel = [...sel, optIdx];
            }
            answers[idx] = sel;
            renderQuestion(idx);
          } else {
            answers[idx] = optIdx;
            main.querySelectorAll('.sc-option').forEach(o => o.classList.remove('selected'));
            this.classList.add('selected');
            // Show "Other" text input if last option selected on a q.other question
            if (q.other && optIdx === q.options.length - 1) {
              let otherWrap = document.getElementById('other-input-wrap');
              if (!otherWrap) {
                otherWrap = document.createElement('div');
                otherWrap.id = 'other-input-wrap';
                otherWrap.style.cssText = 'margin-top:0.75rem;';
                const inp = document.createElement('input');
                inp.type = 'text';
                inp.id = 'other-text-input';
                inp.placeholder = 'Please specify your role';
                inp.value = answers['otherText_' + idx] || '';
                inp.style.cssText = 'width:100%;padding:0.875rem 1rem;border:1.5px solid var(--gray-200);border-radius:10px;font-family:var(--font-body);font-size:0.9375rem;color:var(--navy);outline:none;transition:border-color 150ms;';
                inp.addEventListener('focus', () => inp.style.borderColor = 'var(--orange)');
                inp.addEventListener('blur', () => inp.style.borderColor = 'var(--gray-200)');
                inp.addEventListener('input', () => { answers['otherText_' + idx] = inp.value; });
                otherWrap.appendChild(inp);
                main.querySelector('.sc-options').after(otherWrap);
                setTimeout(() => inp.focus(), 50);
              }
            } else {
              // Remove other input if a different option selected
              const otherWrap = document.getElementById('other-input-wrap');
              if (otherWrap) otherWrap.remove();
              // Auto-advance for non-Other options
              setTimeout(() => app.next(), 300);
            }
          }
        });
      });
    }
  }

  function scaleToScore(val) {
    // 1-10 banded: 1-3 → 0pts, 4-6 → 1pt, 7-10 → 3pts
    if (val >= 7) return 3;
    if (val >= 4) return 1;
    return 0;
  }

  // For Q10 (opinion-driven comments) the scale is inverted — low score = good
  // handled by flipping the value before band mapping
  function scaleToScoreInverted(val) {
    return scaleToScore(11 - val);
  }

  function calcScores() {
    const pillarScores = {};
    pillarNames.forEach(p => { pillarScores[p] = { earned: 0, max: 0 }; });

    questions.forEach((q, idx) => {
      if (!pillarNames.includes(q.pillar)) return;
      if (answers[idx] === undefined) return;

      pillarScores[q.pillar].max += 3;

      if (q.scale) {
        const val = answers[idx];
        // Q10 is inverted (low frequency of opinion comments = good = high score)
        const pts = (q.id === 10) ? scaleToScoreInverted(val) : scaleToScore(val);
        // Q15 is also inverted (high capability walking out = bad = low score)
        // but phrased as "how much leaves" so high val = bad → invert
        const finalPts = (q.id === 15) ? scaleToScoreInverted(val) : pts;
        pillarScores[q.pillar].earned += finalPts;
      } else {
        pillarScores[q.pillar].earned += q.scores[answers[idx]] || 0;
      }
    });

    const pillarPcts = {};
    let totalEarned = 0, totalMax = 0;
    pillarNames.forEach(p => {
      const s = pillarScores[p];
      pillarPcts[p] = s.max > 0 ? Math.round((s.earned / s.max) * 100) : 0;
      totalEarned += s.earned;
      totalMax += s.max;
    });

    const overall = totalMax > 0 ? Math.round((totalEarned / totalMax) * 100) : 0;
    const weakest = pillarNames.reduce((min, p) => pillarPcts[p] < pillarPcts[min] ? p : min, pillarNames[0]);

    return { pillarPcts, overall, weakest };
  }

  function getLevel(pct) {
    if (pct >= 67) return 'high';
    if (pct >= 34) return 'mid';
    return 'low';
  }

  function getHeadline(pct) {
    if (pct >= 75) return 'Strong foundation — time to compound your advantage.';
    if (pct >= 50) return 'Decent base, but fragile under pressure.';
    if (pct >= 25) return 'Significant gaps — your delivery depends on heroics.';
    return 'Critical: your system needs fundamental rebuilding.';
  }

  function getWeakestInsight(pillar) {
    const insights = {
      'Pilot': 'Your team isn\'t capturing "what good looks like" in reusable form. Every scheme starts cold, which means inconsistent quality and avoidable rework.',
      'Automate': 'Quality is trapped in individuals, not embedded in your systems. When key people are unavailable, your output suffers.',
      'Compound': 'Improvements aren\'t accumulating. You\'re solving the same problems repeatedly instead of building on past learning.',
      'Evolve': 'Your growth model depends on personal relationships and heroics rather than a repeatable system that generates work independently.',
      'Digitalise': 'Your traceability and information retrieval are manual and fragile. Audit trails take too long, and capability walks out the door with people.'
    };
    return insights[pillar] || '';
  }

  function renderResults() {
    const { pillarPcts, overall, weakest } = calcScores();
    // Store for submitReport — avoids embedding JSON in HTML attribute (breaks on double-quotes)
    window._lastOverall = overall;
    window._lastPillarPcts = pillarPcts;
    const lvl = getLevel(overall);
    currentQ = totalQ;
    updateProgress();

    let html = '<div class="sc-screen active">';

    // Header
    html += '<div class="results-header">';
    html += '<div class="results-score-circle ' + lvl + '">';
    html += '<div class="results-score-num">' + overall + '%</div>';
    html += '<div class="results-score-label">Overall</div>';
    html += '</div>';
    html += '<div class="results-headline">' + getHeadline(overall) + '</div>';
    html += '<div class="results-subtitle">Here\'s how your delivery system scores across the five PACED\u2122 pillars.</div>';
    html += '</div>';

    // Pillar breakdown
    html += '<div class="pillar-breakdown"><h3>Score by Pillar</h3>';
    pillarNames.forEach(p => {
      const pct = pillarPcts[p];
      const l = getLevel(pct);
      html += '<div class="pillar-row">';
      html += '<div class="pillar-name">' + p + '</div>';
      html += '<div class="pillar-bar"><div class="pillar-bar-fill ' + l + '" style="width:0%" data-width="' + pct + '"></div></div>';
      html += '<div class="pillar-pct">' + pct + '%</div>';
      html += '</div>';
    });
    html += '</div>';

    // Weakest pillar callout
    html += '<div class="weakest-callout">';
    html += '<svg class="weakest-callout-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/></svg>';
    html += '<div><h4>Your weakest pillar: ' + weakest + ' (' + pillarPcts[weakest] + '%)</h4>';
    html += '<p>' + getWeakestInsight(weakest) + '</p></div>';
    html += '</div>';

    // Contact gate for PDF report
    html += '<div class="email-gate">';
    html += '<h3>Get your detailed PDF breakdown</h3>';
    html += '<p>Specific insights and prioritised next steps for each pillar — sent instantly to your inbox.</p>';
    html += '<form class="email-gate-form" id="report-form" onsubmit="submitReport(event)">';
    html += '<div><label>Full Name *</label><input type="text" name="name" placeholder="John Smith" required></div>';
    html += '<div><label>Company *</label><input type="text" name="company" placeholder="Your company" required></div>';
    html += '<div><label>Role *</label><input type="text" name="role" placeholder="e.g. Engineering Manager" required></div>';
    html += '<div><label>Email *</label><input type="email" name="email" placeholder="you@company.com" required></div>';
    html += '<div class="full-width"><label>Phone <span class="optional">(optional)</span></label><input type="tel" name="phone" placeholder="+44 7xxx xxx xxx"></div>';
    html += '<div class="sc-submit-wrap"><button type="submit">Send My Report</button></div>';
    html += '</form>';
    html += '</div>';

    // Earned CTA — hidden until form submitted
    html += '<div class="earned-cta" id="earned-cta">';
    html += '<div class="earned-cta-eyebrow">Complimentary offer</div>';
    html += '<h4>You\'ve earned a free 30-minute AI Workflow Audit</h4>';
    html += '<p>Based on your results, Bill will walk through your weakest pillar and map out one specific workflow you could automate in the next 30 days.</p>';
    html += '<a href="https://calendly.com/bill-guo-automatex/30min" target="_blank" rel="noopener" class="sc-btn sc-btn-next">Book Your Free Audit Call</a>';
    html += '</div>';

    html += '</div>';
    main.innerHTML = html;

    // Animate bars
    setTimeout(() => {
      main.querySelectorAll('.pillar-bar-fill').forEach(bar => {
        bar.style.width = bar.dataset.width + '%';
      });
    }, 100);
  }

  // ========== APP CONTROLLER ==========
  window.app = {
    next() {
      const q = questions[currentQ];
      if (q && q.openText) {
        const ta = document.getElementById('open-text');
        if (ta && ta.value.trim()) answers[currentQ] = ta.value.trim();
      }
      if (currentQ >= totalQ - 1) {
        renderResults();
      } else {
        renderQuestion(currentQ + 1);
      }
    },
    prev() {
      if (currentQ > 0) renderQuestion(currentQ - 1);
    }
  };

  // Start
  renderQuestion(0);
})();

function showScorecardSuccess(btn) {
  var wrap = btn.closest('.sc-submit-wrap');
  if (!wrap) return;
  var count = 14;
  var particles = [];
  for (var i = 0; i < count; i++) {
    var p = document.createElement('div');
    p.className = 'sc-magnetize-particle';
    var x = (Math.random() * 220 - 110);
    var y = (Math.random() * 100 - 50);
    p.style.transform = 'translate(' + x + 'px, ' + y + 'px)';
    p.dataset.bx = (Math.random() * 300 - 150);
    p.dataset.by = (Math.random() * 200 - 100);
    wrap.appendChild(p);
    particles.push(p);
  }
  setTimeout(function() {
    particles.forEach(function(p) { p.classList.add('attracted'); });
  }, 50);
  setTimeout(function() {
    particles.forEach(function(p) {
      p.classList.remove('attracted');
      p.classList.add('burst');
      p.style.transform = 'translate(' + p.dataset.bx + 'px, ' + p.dataset.by + 'px) scale(0)';
    });
  }, 900);
  setTimeout(function() {
    particles.forEach(function(p) { p.remove(); });
  }, 1500);
}

function submitReport(e) {
  e.preventDefault();
  var form = document.getElementById('report-form');
  var btn = form.querySelector('button');
  var overallScore = window._lastOverall;
  var pillarPcts = window._lastPillarPcts;

  // Build full responses from the live questions/answers data
  var responses = [];
  var qs = window._scorecardQuestions;
  var ans = window._scorecardAnswers;
  for (var i = 0; i < qs.length; i++) {
    var q = qs[i];
    var a = ans[i];
    var entry = { question: q.text, pillar: q.pillar };
    if (q.openText) {
      entry.answer = a || '';
    } else if (q.scale) {
      // Scale questions store the numeric value directly
      entry.selected = a !== undefined ? a + '/10' : null;
    } else if (q.multi) {
      entry.selected = Array.isArray(a) ? a.map(function(idx) { return q.options[idx]; }) : [];
    } else if (a !== undefined) {
      var selectedText = q.options[a];
      // Include "Other" typed text if present
      if (q.other && a === q.options.length - 1 && ans['otherText_' + i]) {
        selectedText += ': ' + ans['otherText_' + i];
      }
      entry.selected = selectedText;
    } else {
      entry.selected = null;
    }
    responses.push(entry);
  }

  var data = {
    name: form.name.value,
    company: form.company.value,
    role: form.role.value,
    email: form.email.value,
    phone: form.phone.value || '',
    overallScore: overallScore,
    pillarScores: pillarPcts,
    responses: responses,
    source: 'Scorecard PDF Request',
    timestamp: new Date().toISOString()
  };

  // Fire-and-forget — don't block on the 30s n8n workflow
  fetch('https://billguo.app.n8n.cloud/webhook/pace-scorecard', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  }).catch(function(err) {
    console.error('[Scorecard] Webhook error:', err);
  });

  // Immediately show success (don't wait for workflow to finish)
  btn.textContent = 'Sending...';
  btn.disabled = true;

  setTimeout(function() {
    btn.textContent = 'Report Sent!';
    btn.style.background = '#10B981';
    showScorecardSuccess(btn);
    // Reveal earned CTA after the animation settles
    setTimeout(function() {
      var cta = document.getElementById('earned-cta');
      if (cta) {
        cta.style.display = 'block';
        cta.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }, 900);
  }, 800);
}
</script>
